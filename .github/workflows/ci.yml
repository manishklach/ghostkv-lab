# GhostKV Lab — github.com/manishklach/ghostkv-lab
# Patent: IN 202641062451
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  synthetic-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Generate synthetic results
        run: python experiments/generate_results.py

      - name: Run sketch quality audit
        run: python experiments/sketch_quality_audit.py

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostkv-results
          path: results/
          retention-days: 7

